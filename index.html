<style>
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#21262d;
  --border:#30363d;
  --text:#c9d1d9;

}
.lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
.lock-icon{font-size:60px;filter:drop-shadow(0 0 20px var(--accent))}
.lock-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px;width:320px;max-width:90vw;text-align:center}
.lock-title{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:8px}
.lock-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.lock-input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;text-align:center;letter-spacing:4px;font-weight:600;outline:none;transition:border-color .2s}
.lock-input:focus{border-color:var(--accent)}
.lock-btn{width:100%;padding:12px;margin-top:14px;border-radius:8px;border:none;background:var(--accent);color:#000;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.lock-btn:hover{background:#ffd966}
.lock-error{color:#ff4d4f;font-size:12px;margin-top:10px;min-height:18px}
.lock-bottom{font-size:10px;color:var(--text3);margin-top:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.header{background:linear-gradient(135deg,#1a1b26,#16181f);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}

.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mode-tabs{display:flex;gap:3px;background:var(--surface);border-radius:8px;padding:3px;border:1px solid var(--border)}
.mode-tab{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.mode-tab.active{background:var(--accent);color:#000}.mode-tab:hover:not(.active){color:var(--text);background:var(--surface2)}
.btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#ffd966}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:#ff4d4f22;color:#ff4d4f;border:1px solid #ff4d4f55}.btn-danger:hover{background:#ff4d4f44}
.btn-green{background:#4ade8022;color:#4ade80;border:1px solid #4ade8055}.btn-green:hover{background:#4ade8033}
.btn-purple{background:#7c6ef722;color:#7c6ef7;border:1px solid #7c6ef755}.btn-purple:hover{background:#7c6ef733}
.layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;display:flex;flex-direction:column}
.sidebar-section{padding:0 10px;margin-bottom:4px}
.sidebar-label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1.5px;padding:8px 6px 4px}
.sidebar-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .12s;margin-bottom:1px}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:var(--accent)18;color:var(--accent);font-weight:600}
.sidebar-item .icon{font-size:14px;width:16px;text-align:center}
.mode-tab{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.mode-tab.active{background:var(--accent);color:#000}.mode-tab:hover:not(.active){color:var(--text);background:var(--surface2)}

.btn-green{background:#4ade8022;color:#4ade80;border:1px solid #4ade8055}.btn-green:hover{background:#4ade8033}

.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;display:flex;flex-direction:column}

.sidebar-item:hover{background:var(--surface2);color:var(--text)}

.builder-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--accent)18;color:var(--accent);border:1px solid var(--accent)33;border-radius:14px;padding:2px 7px 2px 5px;font-size:10px;cursor:default}
.chip .x{color:var(--text3);cursor:pointer;font-size:12px;line-height:1}.chip .x:hover{color:#ff4d4f}
.heat{display:inline-flex;align-items:center;gap:2px;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:600}
.heat-cold{background:#3b82f622;color:#60a5fa}.heat-warm{background:#f59e0b22;color:#f59e0b}.heat-hot{background:#ef444422;color:#ef4444}.heat-fire{background:#ff6b3533;color:#ff6b35}
.cat-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cat-icon{font-size:20px}.cat-title{font-size:16px;font-weight:700}.cat-desc{font-size:11px;color:var(--text2);margin-top:1px}
.sub{margin-bottom:20px}
.sub-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:5px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sub-title::before{content:'';width:3px;height:11px;border-radius:2px;display:inline-block}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .12s;line-height:1.3;user-select:none;position:relative}
.tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent)0d}
.tag.sel{background:var(--accent)1a;border-color:var(--accent)77;color:var(--accent)}
.tag .zh{display:block;font-size:9px;color:var(--text3);margin-top:1px}.tag.sel .zh{color:var(--accent)88}
.tag .click-count{position:absolute;top:1px;right:3px;font-size:8px;color:var(--text3)}
.tag .hot-dot{position:absolute;top:2px;right:2px;font-size:7px}
.tag .contributor{position:absolute;bottom:1px;right:3px;font-size:7px;color:var(--accent3);opacity:.7}
.c-scene .sub-title::before{background:var(--cyan)}.c-scene .tag:hover,.c-scene .tag.sel{border-color:var(--cyan);color:var(--cyan);background:#22d3ee0d}
.c-style .sub-title::before{background:var(--pink)}.c-style .tag:hover,.c-style .tag.sel{border-color:var(--pink);color:var(--pink);background:#f472b60d}
.c-camera .sub-title::before{background:var(--green)}.c-camera .tag:hover,.c-camera .tag.sel{border-color:var(--green);color:var(--green);background:#4ade800d}
.c-motion .sub-title::before{background:var(--accent2)}.c-motion .tag:hover,.c-motion .tag.sel{border-color:var(--accent2);color:var(--accent2);background:#ff7f500d}
.c-compose .sub-title::before{background:var(--accent3)}.c-compose .tag:hover,.c-compose .tag.sel{border-color:var(--accent3);color:var(--accent3);background:#7c6ef70d}
.c-light .sub-title::before{background:#fbbf24}.c-light .tag:hover,.c-light .tag.sel{border-color:#fbbf24;color:#fbbf24;background:#fbbf240d}
.c-quality .sub-title::before{background:var(--accent)}.c-quality .tag:hover,.c-quality .tag.sel{border-color:var(--accent);color:var(--accent)}
.c-color .sub-title::before{background:#a78bfa}.c-color .tag:hover,.c-color .tag.sel{border-color:#a78bfa;color:#a78bfa;background:#a78bfa0d}
.c-negative .sub-title::before{background:#f87171}.c-negative .tag:hover,.c-negative .tag.sel{border-color:#f87171;color:#f87171;background:#f871710d}
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.tpl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer}
.tpl-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px #0008}
.tpl-img{width:100%;height:160px;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.tpl-img img{width:100%;height:100%;object-fit:cover}
.tpl-img .placeholder{color:var(--text3);font-size:32px}
.tpl-img .upload-btn{position:absolute;bottom:5px;right:5px;background:#000a;border:none;color:var(--text2);padding:3px 7px;border-radius:5px;font-size:10px;cursor:pointer;opacity:0;transition:opacity .15s}
.tpl-card:hover .upload-btn{opacity:1}
.tpl-body{padding:10px}
.tpl-cat{display:inline-block;font-size:9px;padding:2px 7px;border-radius:8px;background:var(--accent)1a;color:var(--accent);font-weight:600;margin-bottom:4px}
.tpl-title{font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.3}
.tpl-desc{font-size:10px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;font-family:'SF Mono',Consolas,monospace}
.tpl-footer{display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border)}
.tpl-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.tpl-actions .btn{padding:3px 8px;font-size:10px}

.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;animation:modalIn .2s}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:700}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:8px 16px;border-radius:7px;font-size:11px;color:var(--text);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.room-banner{background:var(--surface);border-bottom:1px solid var(--accent)22;padding:6px 20px;display:flex;align-items:center;gap:10px;font-size:11px}
.room-code{background:var(--accent)18;color:var(--accent);padding:2px 8px;border-radius:5px;font-family:'SF Mono',Consolas,monospace;font-weight:700;font-size:12px;letter-spacing:2px;cursor:pointer}
.room-code:hover{background:var(--accent)33}

.form-input:focus,.form-select:focus{border-color:var(--accent)}
textarea.form-input{min-height:70px;resize:vertical;font-family:'SF Mono',Consolas,monospace}

<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-box">
    <div class="lock-title">🍌 NanoBanana</div>
    <div class="lock-sub">请输入访问密码</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="密码" maxlength="20" autocomplete="off">
    <button class="lock-btn" onclick="checkPassword()">进入</button>
    <div class="lock-error" id="lockError"></div>
  </div>
  <div class="lock-bottom">© NanoBanana Pro</div>
</div>
<script>var _correctPwd="haonan666";function checkPassword(){var p=document.getElementById("lockInput").value;if(p===_correctPwd){document.getElementById("lockScreen").style.display="none"}else{document.getElementById("lockError").textContent="密码错误，请重试";document.getElementById("lockInput").value="";document.getElementById("lockInput").focus()}}document.getElementById("lockInput").addEventListener("keydown",function(e){if(e.key==="Enter")checkPassword()});</script>

  <div class="logo"><div class="logo-icon">🍌</div><div><div class="logo-text">NanoBanana Pro</div><div class="logo-sub">AI 提示词词库 · 协作版</div></div></div>

</div>

, explicit content",zh:"不当内容排除"},{en:"logo, brand, copyright",zh:"商标版权排除"},{en:"duplicate, copy",zh:"重复复制排除"}]}}},haonan:{label:"浩楠自用",icon:"📦",c:"c-haonan",desc:"浩楠原创提示词库",subs:{"运镜技巧":[{en:"FPV 电影感飞行，穿梭于黄金时段超逼真的树屋：桥梁、楼梯、温暖的室内空间，从天窗飞出，快节奏的动态镜头。",zh:"FPV无人机镜头"},{en:"Harbor Break Run 格式：15秒/6镜头/贴地电影式追逐/无对白 风格：工业港口，蓝色时刻，湿混凝土，钠蒸汽灯，柔和的雾气，实际镜头光晕，克制的调色板，逼真的35毫米胶片感。镜头01：缓慢的空中下降镜头进入一个正在运作的港口，一辆哑光黑色的高速飞车在堆叠的集装箱和起重机之间，沿着一条被雨水浸湿的维修道路疾驰而过。镜头02：摄像机低位固定在车尾，距离足够近，能感受到后悬架的震动；橙色的码头灯光在湿漉漉的车身面板上拖曳出光痕。镜头03：一辆卡车意外地倒车横穿车道，迫使骑手急转弯，从叉车和集装箱角落之间狭窄的缝隙中穿过。镜头04：路径穿过起重机臂下方和悬挂的链条之间，高速飞车擦过钢制护栏边缘时，水滴和火花四溅。镜头05：摄像机前移，以四分之三正面角度拍摄，骑手驶出码头迷宫，掠过开阔的黑色水面，城市灯光在水面上闪烁。镜头06：最后一个弯道展现了骑手身后完整的港口天际线；高速飞车冲下码头，驶入薄雾和钠灯的辉光中。",zh:"高速电影式追逐"},{en:"镜头从高处俯视。女人无意识地用手指抓着床单边缘，轻轻抚摸着枕头，然后缓缓抬起睡眼惺忪的脸，目光迷离地从下往上扫过镜头，流露出毫不掩饰的爱意。她轻轻地用脸颊蹭了蹭枕头，露出了之前埋在枕头里的脸庞，似乎还不情愿起床，仿佛还没完全清醒。她伸出双臂，手指在晨光中徒劳地摸索了两下，然后在被褥里扭动了一下，用她那独特的、略带沙哑、带着鼻音的嗓音，带着不情愿的睡意，轻声低语道：\"光线……太亮了……（打哈欠）我不想起来，再陪我睡一会儿吧……\"她话语的结尾带着一丝朦胧的梦呓，渐渐融入窗外鸟儿清脆的鸣叫声中。",zh:"起床镜头"}],"角色设定":[{en:"Create a professional character reference sheet based strictly on the uploaded reference image. Use a clean, neutral plain background and present the sheet as a technical model turnaround while matching the exact visual style of the reference (same realism level, rendering approach, texture, color treatment, and overall aesthetic). Arrange the composition into two horizontal rows. Top row: four full-body standing views placed side-by-side in this order: front view, left profile view (facing left), right profile view (facing right), back view. Bottom row: three highly detailed close-up portraits aligned beneath the full-body row in this order: front portrait, left profile portrait (facing left), right profile portrait (facing right). Maintain perfect identity consistency across every panel. Keep the subject in a relaxed pose and with consistent scale and alignment between views, accurate anatomy, and clear silhouette; ensure even spacing and clean panel separation, with uniform framing and consistent head height across the full-body lineup and consistent facial scale across the portraits. Lighting should be consistent across all panels (same direction, intensity, and softness), with natural, controlled shadows that preserve detail without dramatic mood shifts. Output a crisp, print-ready reference sheet look, sharp details.",zh:"gemini角色一致性"},{en:"你是一位顶尖的游戏与动漫概念美术设计大师，擅长制作详尽的角色设定图。你具备\"像素级拆解\"的能力，能够透视角色的穿着层级、捕捉微表情变化，并将其相关的物品进行具象化还原。任务目标：根据用户上传或描述的主体形象，生成一张\"全景式角色深度概念分解图\"。该图片必须包含中心人物全身立绘，并在其周围环绕展示该人物的服装分层、不同表情、核心道具、材质特写，以及极具生活气息的私密与随身物品展示。视觉规范：构图布局：中心位放置角色的全身立绘或主要动态姿势，作为视觉锚点；环绕位在中心人物四周空白处，有序排列拆解后的元素；使用手绘箭头或引导线，将周边的拆解物品与中心人物的对应部位或所属区域连接起来。拆解内容：核心迭代区域、服装分层等。风格：保持高质量的2D插画风格或概念设计草图风格，线条干净利落。背景使用米黄色、羊皮纸或浅灰色纹理背景，营造设计手稿的氛围。文字说明在每个拆解元素旁模拟手写注释，简要说明材质或品牌/型号暗示。",zh:"美术设定人物设计"}],"质感风格":[{en:"还原真实世界的人物皮肤质感，超写实，现实物理世界，真实的光影与环境光，沙漠背景，肤细节：增加哑光皮肤、汗珠，光泽度。增加一点现实世界的雾霾朦胧感，超真实的相机拍照，现实世界，不要动画人物。Unpolished realism：非抛光写实主义。Subsurface scattering (SSS)：次表面散射（让皮肤透光，有血色）。Visible skin pores & micro-wrinkles：清晰可见的毛孔与微纹理。Hyper-realistic skin texture：超写实皮肤纹理。Subtle skin imperfections：微小的皮肤瑕疵（如淡斑、细微疤痕、痣）。Peach fuzz (vellus hair)：脸部细绒毛（极重要，打破光滑感）。光影与反射：Anisotropic specular highlights各向异性高光让毛发和皮肤反射更自然，Caustics & volumetric lighting焦散与体积光，Soft natural shadows柔和的自然阴影，Global illumination (GI)全局光照确保环境光正确反射到人物身上，Natural HDRI environment map自然的环境贴图提供真实反射源。眼神与眼部细节：Natural catchlight眼神光/高光点极重要让眼睛\"活\"过来，Damp tear ducts & lower limbus湿润的泪道与下眼睑边缘，Intricate iris patterns复杂的虹膜纹理，Subtle eye movement微妙的眼球震颤/运动，Dilated pupils扩大的瞳孔暗示情绪。微表情与肌肉：Micro-expression of subtle contemplation细微沉思的微表情，Tension in the corrugator muscles眉间肌的张力暗示思考或忧虑，Asymmetrical smile非对称的微笑比完美对称更真实，Real-world face anatomy真实的脸部解剖结构。",zh:"超写实真人质感"},{en:"超广角透视，戏剧性仰拍视角，夸张透视感，变形宽银幕电影质感，模拟IMAX胶片摄影机，搭配Panavision C系列镜头（焦段35mm，光圈f4）。边缘添加轻微柔焦与适度的皮，颗粒感。",zh:"大透视构图"},{en:"建模质感，游戏级高精度建模，ZBrush雕刻细节，次表面散射皮肤，程序化毛发，高精度PBR材质，8K贴图，逼真皮肤纹理可见毛孔，体积光照明，虚幻引擎5渲染，照片级真实感。",zh:"建模质感"},{en:"朦胧感，柔焦，薄雾，焦散，体积光，丁达尔效应，柔和散射光，梦境氛围，散景效果，浅景深，空气感，烟雾缭绕，柔化边缘。",zh:"朦胧感"},{en:"材质与纹理：皮肤使用次表面散射材质（SSS），肌肉使用肌理纹理，服装使用PBR材质布料模拟。金属表面反射周围环境，皮革使用各向异性高光，丝绸具有柔和光泽。环境使用程序化生成的地形和植被。",zh:"材质与纹理"}],"分镜模板":[{en:"分镜模板：镜头编号、时间码、画面描述、运镜方式、镜头类型、景别、光线、声音/对白、备注。宽高比16:9，帧率24fps，电影感叙事风格。",zh:"分镜模板"},{en:"场景多角度统一模板：确保同一场景不同角度的视觉一致性。相同的光源方向和色温，统一的色彩分级风格，贯穿一致的道具和布景，保持连贯的时间段和天气条件，使用相同的世界观设定参考图。",zh:"场景多角度统一模板"},{en:"宏观叙事逻辑：开场建立镜头建立时间和地点，主体镜头引入核心角色，冲突镜头制造戏剧张力，高潮镜头达到情感顶峰，结尾镜头给出叙事结论。",zh:"宏观叙事逻辑"}],"特摄风格":[{en:"核心主题：写实光明特摄 | BLACK SUN 美学 | 破碎肉身 | 战损变身 | 冰岛景色无人区。人物与基础设定：面部参照上传图片，五官、脸型、发型百分百还原，杜绝美化，面部伤口，血持一致。刘海覆额，表情全程阴郁。变身瞬间，眉心仅轻微蹙起，拒绝昂扬斗志与眼神保持压抑感。服装：哑光灰色戴帽风衣，机械结合外星生物感的能量球为精密金属加生物细胞质地，能量球内部核心为暗红色水晶。场景：冰岛无人区，大雨，荒野，灰调天空，天空中有类似死亡搁浅游戏中的黑线。氛围与画质：视觉基调变形宽银幕电影质感，模拟IMAX胶片摄影机，搭配Panavision C系列镜头（焦段35mm，光圈f4）。色彩与影调：低饱和灰蓝主调，暗部信息压缩保留细节，边缘添加轻微柔焦与适度的皮颗粒感。风格核心：参考《仮面BLACKSUN》美学风格，强调生物质感与外星科技的融合，结合合金装备雷电的工业机械感，营造压抑、沉重、机械撞击身体，实拍的肉身痛苦感。运镜规则：单镜头一镜到底无剪辑。角度开场仰拍人物半身左侧面30度聚焦腰部以上部位，开始变身镜头以极快速度绕至正面平视上半身，变身完成后环绕至人物右侧面俯拍。呼吸感手持拍摄全程保持极其轻微的如呼吸般的镜头浮动增强临场感。0-2秒凝视：主角拖着疲惫的身躯戴帽站立略微低头，目光锁定手中像心脏一样跳动的机械与生物结合的能量球，脊背紧绷。右手缓慢抬起，猛烈捏碎能量球。镜头极缓向前推进捕捉身体因呼吸产生的剧烈起伏。特效整颗眼球骤然亮起暗红色光芒，眼眶周围裂开，眼睛亮起的炫光使画面镜头产生光斑。2-5秒启动：抬头怒喊，声音怒喊Fusion！话音刚落手掌猛烈捏碎跳动的能量球，能量球本体被挤压而开裂，风衣的帽子被震开，红光伴随生物球的细胞组分裂的缝隙亮起，捏碎后手被能量球在挤压下灼伤，能量注入身体。身体逐渐变形，身上的血肉开始与机械融合，风衣被撕裂露出下方银灰色的机械装甲，装甲层层覆盖肉体，最终全身覆盖完整的机械外骨骼形态。能量从身体裂缝中泄漏出来，伴随蒸汽效果。",zh:"假面骑士变身"}]}}};

// ═══════════ STATE & STORAGE ═══════════
var DICT,TPLS,selected=[],mode='dict',dictCat='all',tplCat='all';
var clicks,images,tplClicks,customTags,customTpls,room,myName,syncLog;
function gs(k,d){try{return JSON.parse(localStorage.getItem('nb_'+k))||d}catch(e){return d}}
function ss(k,v){try{localStorage.setItem('nb_'+k,JSON.stringify(v))}catch(e){}}
function now(){return new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function genCode(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';for(var i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function addLog(a,d){syncLog.unshift({t:now(),u:myName||'匿名',a:a,d:d});if(syncLog.length>50)syncLog.length=50;ss('syncLog',syncLog)}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function $(id){return document.getElementById(id)}
var toastT;
function toast(m){$('toast').textContent=m;$('toast').classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){$('toast').classList.remove('show')},2200)}
function getHeat(c){if(c>=20)return'🔥🔥🔥🔥';if(c>=10)return'🔥🔥🔥';if(c>=5)return'🔥🔥';if(c>=2)return'🔥';return''}
function getHeatCls(c){if(c>=20)return'heat-fire';if(c>=10)return'heat-hot';if(c>=5)return'heat-warm';if(c>=2)return'heat-cold';return''}
function loadState(){
  clicks=gs('clicks',{});images=gs('images',{});tplClicks=gs('tplClicks',{});
  customTags=gs('customTags',[]);customTpls=gs('customTpls',[]);
  room=gs('room',null);myName=gs('myName','');syncLog=gs('syncLog',[]);
  mergeData();
}
function mergeData(){
  DICT=JSON.parse(JSON.stringify(BD));
  customTags.forEach(function(ct){
    if(!DICT[ct.cat])DICT[ct.cat]={label:ct.cat,icon:'📌',c:'c-scene',desc:'自定义',subs:{}};
    if(!DICT[ct.cat].subs[ct.sub])DICT[ct.cat].subs[ct.sub]=[];
    var exists=DICT[ct.cat].subs[ct.sub].some(function(t){return t.en===ct.en});
    if(!exists)DICT[ct.cat].subs[ct.sub].push({en:ct.en,zh:ct.zh,author:ct.author});
  });
  TPLS=JSON.parse(JSON.stringify(BT)).concat(customTpls.map(function(ct){return Object.assign({},ct,{isCustom:true})}));
}
function totalDict(){var n=0;for(var k in DICT)for(var s in DICT[k].subs)n+=DICT[k].subs[s].length;return n}
function countCat(k){var n=0;for(var s in DICT[k].subs)n+=DICT[k].subs[s].length;return n}
function getAllTagStats(){var a=[];for(var ck in DICT){var cat=DICT[ck];for(var sn in cat.subs){cat.subs[sn].forEach(function(t){a.push({en:t.en,zh:t.zh,count:clicks[t.en]||0,cat:cat.label,sub:sn})})}}return a.filter(function(t){return t.count>0})}
// ═══════════ MODE & SIDEBAR ═══════════
function switchMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(function(t,i){t.classList.toggle('active',['dict','tpl','hot','collab'][i]===m)});
  buildSidebar();renderContent();
}
function buildSidebar(){
  var sb=$('sidebar'),h='<div class="search-box"><div class="search-wrap"><input class="search-input" id="searchInput" placeholder="搜索词条..." oninput="handleSearch(this.value)"></div></div>';
  if(mode==='dict'){
    h+='<div class="sidebar-section"><div class="sidebar-label">词条分类</div>';
    h+=sbI('all','⚡','全部',totalDict(),'active');
    for(var k in DICT)h+=sbI(k,DICT[k].icon,DICT[k].label,countCat(k));
    h+='</div>';
    h+='<div class="sidebar-section"><div class="sidebar-label">🔥 最近使用</div>';
    var recent=getAllTagStats().sort(function(a,b){return b.count-a.count}).slice(0,6);
    if(recent.length===0)h+='<div style="padding:4px 10px;font-size:10px;color:var(--text3)">暂无</div>';
    else recent.forEach(function(r){h+='<div class="sidebar-item" onclick="copySingle(\''+esc(r.en)+'\')" title="'+esc(r.zh)+'"><span class="icon">📋</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">'+esc(r.zh)+'</span><span class="heat '+getHeatCls(r.count)+'">'+r.count+'</span></div>'});
    h+='</div>';
  }else if(mode==='tpl'){
    var cats=[];TPLS.forEach(function(t){if(cats.indexOf(t.cat)<0)cats.push(t.cat)});
    h+='<div class="sidebar-section"><div class="sidebar-label">模板来源</div>';
    h+=sbI('all','📦','全部模板',TPLS.length,'active');
    cats.forEach(function(c){h+=sbI('tpl-'+c,'🏷',c,TPLS.filter(function(t){return t.cat===c}).length)});
    h+='</div>';
  }else if(mode==='hot'){
    h+='<div class="sidebar-section"><div class="sidebar-label">🔥 热度排行</div>';
    var dh=getAllTagStats().sort(function(a,b){return b.count-a.count}).slice(0,8);
    dh.forEach(function(r,i){h+='<div class="sidebar-item" onclick="copySingle(\''+esc(r.en)+'\')"><span class="icon">'+(i<3?'🔥':'📌')+'</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">'+esc(r.zh)+'</span><span class="count">'+r.count+'</span></div>'});
    h+='</div>';
  }else{
    h+='<div class="sidebar-section"><div class="sidebar-label">👥 协作工具</div>';
    h+='<div class="sidebar-item active" onclick="showRoomModal()"><span class="icon">🏠</span>房间管理</div>';
    h+='<div class="sidebar-item" onclick="showAddModal()"><span class="icon">➕</span>添加词条/模板</div>';
    h+='<div class="sidebar-item" onclick="exportRoom()"><span class="icon">📤</span>导出房间数据</div>';
    h+='<div class="sidebar-item" onclick="importRoom()"><span class="icon">📥</span>导入房间数据</div>';
    if(room)h+='<div class="sidebar-item" onclick="showMembers()"><span class="icon">👥</span>成员 ('+room.members.length+')</div>';
    h+='</div>';
  }
  var tc=Object.values(clicks).reduce(function(a,b){return a+b},0)+Object.values(tplClicks).reduce(function(a,b){return a+b},0);
  h+='<div class="sidebar-bottom"><div class="stat-row"><span>总点击</span><span>'+tc+'</span></div><div class="stat-row"><span>自定义词条</span><span>'+customTags.length+'</span></div><div class="stat-row"><span>自定义模板</span><span>'+customTpls.length+'</span></div><div class="stat-row"><span>效果图</span><span>'+Object.keys(images).length+'</span></div></div>';
  sb.innerHTML=h;
}
function sbI(key,icon,label,count,cls){
  return '<div class="sidebar-item '+(cls||'')+'" onclick="'+(mode==='dict'?"showDictCat('"+key+"',this)":"tplFilter('"+key+"',this)")+'"><span class="icon">'+icon+'</span>'+label+'<span class="count">'+count+'</span></div>';
}
// ═══════════ RENDER CONTENT ═══════════
function renderContent(){
  if(mode==='dict')renderDict();
  else if(mode==='tpl')renderTemplates();
  else if(mode==='hot')renderHot();
  else renderCollab();
}
function showDictCat(key,el){
  if(el){document.querySelectorAll('.sidebar-item').forEach(function(i){i.classList.remove('active')});el.classList.add('active')}
  dictCat=key;renderDict();
}
function renderDict(){
  var area=$('content');
  if(dictCat==='all'){
    var h='<div class="cat-head"><div class="cat-icon">⚡</div><div><div class="cat-title">全部词条</div><div class="cat-desc">点击添加到组合 · 自定义词条标有紫色标记</div></div></div>';
    for(var k in DICT){var cat=DICT[k];
      h+='<div class="sub" style="margin-bottom:24px"><div class="sub-title '+cat.c+'">'+cat.icon+' '+cat.label+'</div><div class="tags">';
      for(var sn in cat.subs)cat.subs[sn].forEach(function(t){h+=tagHTML(t,k,cat.c)});
      h+='</div></div>';
    }
    area.innerHTML=h;
  }else{
    var cat=DICT[dictCat];
    var h='<div class="cat-head"><div class="cat-icon">'+cat.icon+'</div><div><div class="cat-title">'+cat.label+'</div><div class="cat-desc">'+cat.desc+'</div></div></div>';
    for(var sn in cat.subs){
      h+='<div class="sub"><div class="sub-title '+cat.c+'">'+sn+'</div><div class="tags">';
      cat.subs[sn].forEach(function(t){h+=tagHTML(t,dictCat,cat.c)});
      h+='</div></div>';
    }
    area.innerHTML=h;
  }
}
function tagHTML(t,catKey,cc){
  var sel=selected.some(function(s){return s.en===t.en})?'sel':'';
  var cnt=clicks[t.en]||0,heat=getHeat(cnt);
  var contrib=t.author?'<span class="contributor">'+esc(t.author)+'</span>':'';
  var custom=t.author?'<span class="custom-badge">自定义</span>':'';
  return '<div class="tag '+sel+' '+cc+'" onclick="toggleTag(\''+esc(t.en)+'\',\''+esc(t.zh)+'\',\''+catKey+'\')" data-en="'+esc(t.en)+'">'+custom+t.en+'<span class="zh">'+t.zh+'</span>'+(cnt>0?'<span class="click-count">'+cnt+'</span>':'')+(heat?'<span class="hot-dot">'+heat+'</span>':'')+contrib+'</div>';
}
function toggleTag(en,zh,cat){
  clicks[en]=(clicks[en]||0)+1;ss('clicks',clicks);
  var idx=selected.findIndex(function(s){return s.en===en});
  if(idx>-1)selected.splice(idx,1);else selected.push({en:en,zh:zh,cat:cat});
  updateBuilder();
  document.querySelectorAll('.tag[data-en="'+CSS.escape(en)+'"]').forEach(function(el){
    el.classList.toggle('sel',idx===-1);
    var cnt=clicks[en],cc=el.querySelector('.click-count');
    if(cc)cc.textContent=cnt;else{var sp=document.createElement('span');sp.className='click-count';sp.textContent=cnt;el.appendChild(sp)}
    var hd=el.querySelector('.hot-dot'),ht=getHeat(cnt);
    if(hd){if(ht)hd.textContent=ht;else hd.remove()}else if(ht){var sp=document.createElement('span');sp.className='hot-dot';sp.textContent=ht;el.appendChild(sp)}
  });
  buildSidebar();
}
function copySingle(en){navigator.clipboard.writeText(en).then(function(){toast('📋 已复制: '+en)});clicks[en]=(clicks[en]||0)+1;ss('clicks',clicks)}
// ── TEMPLATES ──
function tplFilter(key,el){if(el){document.querySelectorAll('.sidebar-item').forEach(function(i){i.classList.remove('active')});el.classList.add('active')}tplCat=key;renderTemplates()}
function renderTemplates(){
  var area=$('content'),list=TPLS;
  var cat=tplCat==='all'?null:tplCat.replace('tpl-','');
  if(cat)list=list.filter(function(t){return t.cat===cat});
  var h='<div class="cat-head"><div class="cat-icon">🎨</div><div><div class="cat-title">提示词模板</div><div class="cat-desc">NanoBanana Pro & Seedance 2.0 · 点击卡片查看详情</div></div></div><div class="template-grid">';
  list.forEach(function(t){
    var cnt=tplClicks[t.id]||0,heat=getHeat(cnt),img=images[t.id];
    var catColor=t.cat==='Seedance'?'#4ade80':'#f472b6';
    var customBadge=t.isCustom?'<span class="custom-badge">自定义</span>':'';
    h+='<div class="tpl-card" onclick="showTplDetail(\''+t.id+'\')"><div class="tpl-img">'+(img?'<img src="'+img+'" alt="">':'<div class="placeholder">🖼</div>')+'<button class="upload-btn" onclick="event.stopPropagation();uploadImg(\''+t.id+'\')">📷</button></div><div class="tpl-body"><span class="tpl-cat" style="background:'+catColor+'18;color:'+catColor+'">'+customBadge+t.cat+' · '+t.sub+'</span><div class="tpl-title">'+t.title+'</div><div class="tpl-desc">'+t.en.substring(0,100)+(t.en.length>100?'...':'')+'</div><div class="tpl-footer"><div class="tpl-meta">'+(heat?'<span>'+heat+'</span>':'')+'<span>'+cnt+'次</span>'+(t.author?'<span style="color:var(--accent3)">by '+esc(t.author)+'</span>':'')+'</div><div class="tpl-actions"><button class="btn btn-primary" onclick="event.stopPropagation();copyTemplate(\''+t.id+'\')">📋</button></div></div></div>';
  });
  h+='</div>';area.innerHTML=h;
}
function showTplDetail(id){
  var t=TPLS.find(function(x){return x.id===id});if(!t)return;
  tplClicks[id]=(tplClicks[id]||0)+1;ss('tplClicks',tplClicks);
  var cnt=tplClicks[id]||0,heat=getHeat(cnt),img=images[id];
  var h='<div class="modal-head"><h3>'+t.title+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body">';
  if(img)h+='<img src="'+img+'" style="width:100%;border-radius:6px;margin-bottom:10px" alt="">';
  h+='<div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap"><span class="tpl-cat" style="background:#f472b618;color:#f472b6">'+t.cat+'</span><span class="tpl-cat" style="background:#22d3ee18;color:#22d3ee">'+t.sub+'</span>'+(t.isCustom?'<span class="custom-badge">自定义</span>':'')+(heat?'<span class="heat '+getHeatCls(cnt)+'">'+heat+' '+cnt+'次</span>':'')+(t.author?'<span class="heat heat-cold">by '+esc(t.author)+'</span>':'')+'</div>';
  h+='<p style="font-size:12px;color:var(--text2);margin-bottom:6px">'+t.zh+'</p>';
  h+='<div style="font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:600">英文提示词</div><pre>'+t.en+'</pre>';
  h+='<div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-primary" onclick="copyTemplate(\''+id+'\')">📋 复制</button><button class="btn btn-secondary" onclick="uploadImg(\''+id+'\')">📷 上传效果图</button>'+(img?'<button class="btn btn-danger" onclick="removeImg(\''+id+'\')">🗑 删除图</button>':'')+'</div></div>';
  $('modalContent').innerHTML=h;$('modal').classList.add('show');buildSidebar();
}
function closeModal(){$('modal').classList.remove('show')}
$('modal').addEventListener('click',function(e){if(e.target===$('modal'))closeModal()});
function copyTemplate(id){var t=TPLS.find(function(x){return x.id===id});if(!t)return;navigator.clipboard.writeText(t.en).then(function(){toast('✅ 已复制！')})}
// ── IMAGE ──
function uploadImg(id){var inp=$('imgInput');inp.onchange=function(){var f=inp.files[0];if(!f)return;if(f.size>2*1024*1024){toast('⚠ 图片不能超过2MB');return}var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),M=600,w=img.width,h=img.height;if(w>M||h>M){if(w>h){h=h*M/w;w=M}else{w=w*M/h;h=M}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);images[id]=c.toDataURL('image/jpeg',0.7);ss('images',images);toast('✅ 已上传');renderContent();buildSidebar();if($('modal').classList.contains('show'))showTplDetail(id)};img.src=e.target.result};r.readAsDataURL(f);inp.value=''};inp.click()}
function removeImg(id){delete images[id];ss('images',images);toast('🗑 已删除');closeModal();renderContent();buildSidebar()}
// ── HOT ──
function renderHot(){
  var area=$('content'),allTags=getAllTagStats().sort(function(a,b){return b.count-a.count});

function handleSearch(val){
  var q=val.trim().toLowerCase();if(!q){renderContent();return}
  var area=$('content'),results=[];
  if(mode==='dict'||mode==='hot'){for(var ck in DICT){var cat=DICT[ck];for(var sn in cat.subs){cat.subs[sn].forEach(function(t){if(t.en.toLowerCase().indexOf(q)>=0||t.zh.indexOf(q)>=0)results.push({en:t.en,zh:t.zh,catKey:ck,catLabel:cat.label,sub:sn,type:'dict'})})}}}
  if(mode==='tpl'||mode==='hot'){TPLS.forEach(function(t){if(t.en.toLowerCase().indexOf(q)>=0||t.zh.indexOf(q)>=0||t.title.toLowerCase().indexOf(q)>=0)results.push(Object.assign({},t,{type:'tpl'}))})}
  if(results.length===0){area.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">🔍 没有找到 "'+val+'"</div>';return}
  var h='<div class="cat-head"><div class="cat-icon">🔍</div><div><div class="cat-title">搜索结果</div><div class="cat-desc">找到 '+results.length+' 项</div></div></div><div class="tags">';
  results.forEach(function(r){if(r.type==='dict'){var sel=selected.some(function(s){return s.en===r.en})?'sel':'';h+='<div class="tag '+sel+'" onclick="toggleTag(\''+esc(r.en)+'\',\''+esc(r.zh)+'\',\''+r.catKey+'\')" data-en="'+esc(r.en)+'">'+r.en+'<span class="zh">'+r.zh+'</span><span style="font-size:8px;color:var(--text3);display:block">'+r.catLabel+' › '+r.sub+'</span></div>'}else{h+='<div class="tag" onclick="showTplDetail(\''+r.id+'\')">📋 '+r.title+'<span class="zh">'+r.cat+' · '+r.sub+'</span></div>'}});
  h+='</div>';area.innerHTML=h;
}

function exportRoom(){

    room:room,
    customTags:customTags,
    customTpls:customTpls,
    clicks:clicks,
    templateClicks:tplClicks,
    images:images,
    syncLog:syncLog.slice(0,20),
    exportedBy:myName||'anonymous',
    exportTime:new Date().toISOString()
  };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var fn=room?('NanoBanana-'+room.name+'-'+room.code):'NanoBanana-export';
  a.download=fn.replace(/[^a-zA-Z0-9\u4e00-\u9fff-_]/g,'_')+'.json';
  a.click();
  addLog('导出数据',a.download);
  toast('✅ 已导出房间数据！');
}
function importRoom(){
  if(!myName){
    var nn=prompt('请先输入你的昵称：');
    if(!nn)return;myName=nn;ss('myName',myName);
  }
  var inp=$('jsonInput');
  inp.onchange=function(){
    var f=inp.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(e){
      try{
        var data=JSON.parse(e.target.result);
        if(!data.type||data.type.indexOf('nanobanana')<0){toast('⚠ 不是有效的 NanoBanana 数据文件');return}
        mergeImport(data);
      }catch(err){toast('⚠ 文件解析失败: '+err.message)}
    };
    r.readAsText(f);inp.value='';
  };
  inp.click();
}
function joinViaImport(){
  var nn=$('jName').value.trim();
  if(!nn){toast('⚠ 请输入昵称');return}
  myName=nn;ss('myName',myName);
  closeModal();
  importRoom();
}
function mergeImport(data){
  var stats={tags:0,tpls:0,clicks:0};
  // Merge room
  if(data.room){
    if(!room){room=data.room;ss('room',room)}
    else{
      // Merge members
      if(data.room.members){data.room.members.forEach(function(m){if(!room.members.some(function(x){return x.name===m.name})){room.members.push(m)}})}
      ss('room',room);
    }
    renderRoomBanner();
  }
  // Merge custom tags
  if(data.customTags){data.customTags.forEach(function(ct){
    if(!customTags.some(function(x){return x.en===ct.en&&x.cat===ct.cat})){customTags.push(ct);stats.tags++}
  });ss('customTags',customTags)}
  // Merge custom templates
  if(data.customTpls){data.customTpls.forEach(function(ct){
    if(!customTpls.some(function(x){return x.id===ct.id})){customTpls.push(ct);stats.tpls++}
  });ss('customTpls',customTpls)}
  // Merge clicks (sum)
  if(data.clicks){for(var k in data.clicks){clicks[k]=(clicks[k]||0)+data.clicks[k];stats.clicks++}ss('clicks',clicks)}
  if(data.templateClicks){for(var k in data.templateClicks){tplClicks[k]=(tplClicks[k]||0)+data.templateClicks[k]}ss('tplClicks',tplClicks)}
  // Merge images (import doesn't overwrite existing)
  if(data.images){for(var k in data.images){if(!images[k]){images[k]=data.images[k]}}ss('images',images)}
  // Merge sync log
  if(data.syncLog){syncLog=data.syncLog.concat(syncLog);if(syncLog.length>50)syncLog.length=50;ss('syncLog',syncLog)}
  mergeData();
  addLog('导入数据','+'+stats.tags+'词条 +'+stats.tpls+'模板 +'+stats.clicks+'点击');
  buildSidebar();renderContent();
  toast('✅ 导入成功！+'+stats.tags+'词条 +'+stats.tpls+'模板');
}

  h+='</div>';
  // Sync log
  h+='<div style="margin-top:16px"><div class="sub-title">📜 操作记录</div><div class="sync-log">';
  if(syncLog.length===0)h+='<div style="padding:8px;color:var(--text3)">暂无记录</div>';
  else syncLog.forEach(function(e){h+='<div class="sync-entry"><span class="sync-time">'+e.t+'</span><span style="color:var(--accent3)">'+esc(e.u)+'</span><span>'+esc(e.a)+'</span><span style="color:var(--text3)">'+esc(e.d)+'</span></div>'});
  h+='</div></div>';
  area.innerHTML=h;
}
// ═══════════ INIT ═══════════
loadState();
renderRoomBanner();
buildSidebar();
renderContent();
</script>
</body>
</html>
