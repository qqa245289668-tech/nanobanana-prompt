<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍌 NanoBanana · AI 提示词词库 Pro</title>
<style>
:root{--bg:#0e0f13;--surface:#16181f;--surface2:#1e2028;--surface3:#262933;--border:#2a2d38;--accent:#f5c542;--accent2:#ff7f50;--accent3:#7c6ef7;--text:#e8eaf0;--text2:#9399a6;--text3:#5c6270;--green:#4ade80;--pink:#f472b6;--cyan:#22d3ee;--radius:10px;--fire:#ff6b35;--hot:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
.header{background:linear-gradient(135deg,#1a1b26,#16181f);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}.logo-icon{font-size:26px}.logo-text{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px}.logo-sub{font-size:11px;color:var(--text2);margin-top:1px}
.header-actions{display:flex;gap:8px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#ffd966}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:#ff4d4f22;color:#ff4d4f;border:1px solid #ff4d4f55}.btn-danger:hover{background:#ff4d4f44}

/* MODE TABS */
.mode-tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:3px;border:1px solid var(--border)}
.mode-tab{padding:8px 18px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.mode-tab.active{background:var(--accent);color:#000}
.mode-tab:hover:not(.active){color:var(--text);background:var(--surface2)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 57px)}

/* SIDEBAR */
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;display:flex;flex-direction:column}
.sidebar-top{flex:1;overflow-y:auto}
.sidebar-section{padding:0 10px;margin-bottom:4px}
.sidebar-label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1.5px;padding:10px 6px 4px;text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .12s;margin-bottom:1px}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:var(--accent)18;color:var(--accent);font-weight:600}
.sidebar-item .icon{font-size:15px;width:18px;text-align:center}
.sidebar-item .count{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--surface2);color:var(--text3)}
.sidebar-item.active .count{background:var(--accent)25;color:var(--accent)}

/* SEARCH */
.search-box{padding:8px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px 7px 30px;color:var(--text);font-size:12px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-wrap{position:relative}.search-wrap::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px}

/* SIDEBAR BOTTOM - stats */
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.stat-row{display:flex;justify-content:space-between;padding:2px 0}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px}

/* BUILDER */
.builder{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:20px;position:sticky;top:0;z-index:50}
.builder-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;display:flex;align-items:center;gap:6px}
.builder-output{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:12.5px;color:var(--accent);min-height:38px;word-break:break-all;line-height:1.6;margin-bottom:8px;font-family:'SF Mono','Consolas',monospace;max-height:80px;overflow-y:auto}
.builder-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent)18;color:var(--accent);border:1px solid var(--accent)33;border-radius:16px;padding:2px 8px 2px 6px;font-size:11px;cursor:default}
.chip .x{color:var(--text3);cursor:pointer;font-size:13px;line-height:1}.chip .x:hover{color:#ff4d4f}

/* HEAT BADGE */
.heat{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.heat-cold{background:#3b82f622;color:#60a5fa}.heat-warm{background:#f59e0b22;color:#f59e0b}
.heat-hot{background:#ef444422;color:#ef4444}.heat-fire{background:#ff6b3533;color:#ff6b35}
.heat-🔥{background:#ff6b3533;color:#ff6b35}.heat-🔥🔥{background:#ef444433;color:#ef4444}
.heat-🔥🔥🔥{background:#dc262633;color:#dc2626}.heat-🔥🔥🔥🔥{background:#f97316 33;color:#f97316}

/* CAT HEADER */
.cat-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cat-icon{font-size:22px}.cat-title{font-size:18px;font-weight:700}.cat-desc{font-size:12px;color:var(--text2);margin-top:1px}

/* SUB SECTION */
.sub{margin-bottom:24px}
.sub-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--border);letter-spacing:.3px}
.sub-title::before{content:'';width:3px;height:12px;border-radius:2px;display:inline-block}

/* TAG GRID */
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:12px;cursor:pointer;transition:all .12s;line-height:1.35;user-select:none;position:relative}
.tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent)0d}
.tag.sel{background:var(--accent)1a;border-color:var(--accent)77;color:var(--accent)}
.tag .zh{display:block;font-size:10px;color:var(--text3);margin-top:1px}
.tag.sel .zh{color:var(--accent)88}
.tag .click-count{position:absolute;top:2px;right:4px;font-size:9px;color:var(--text3)}
.tag .hot-dot{position:absolute;top:3px;right:3px;font-size:8px}

/* Color themes per category */
.c-scene .sub-title::before{background:var(--cyan)}.c-scene .tag:hover,.c-scene .tag.sel{border-color:var(--cyan);color:var(--cyan);background:#22d3ee0d}.c-scene .tag.sel .zh{color:#22d3ee88}
.c-style .sub-title::before{background:var(--pink)}.c-style .tag:hover,.c-style .tag.sel{border-color:var(--pink);color:var(--pink);background:#f472b60d}.c-style .tag.sel .zh{color:#f472b688}
.c-camera .sub-title::before{background:var(--green)}.c-camera .tag:hover,.c-camera .tag.sel{border-color:var(--green);color:var(--green);background:#4ade800d}.c-camera .tag.sel .zh{color:#4ade8088}
.c-motion .sub-title::before{background:var(--accent2)}.c-motion .tag:hover,.c-motion .tag.sel{border-color:var(--accent2);color:var(--accent2);background:#ff7f500d}.c-motion .tag.sel .zh{color:#ff7f5088}
.c-compose .sub-title::before{background:var(--accent3)}.c-compose .tag:hover,.c-compose .tag.sel{border-color:var(--accent3);color:var(--accent3);background:#7c6ef70d}.c-compose .tag.sel .zh{color:#7c6ef788}
.c-light .sub-title::before{background:#fbbf24}.c-light .tag:hover,.c-light .tag.sel{border-color:#fbbf24;color:#fbbf24;background:#fbbf240d}.c-light .tag.sel .zh{color:#fbbf2488}
.c-quality .sub-title::before{background:var(--accent)}.c-quality .tag:hover,.c-quality .tag.sel{border-color:var(--accent);color:var(--accent);background:var(--accent)0d}.c-quality .tag.sel .zh{color:var(--accent)88}
.c-color .sub-title::before{background:#a78bfa}.c-color .tag:hover,.c-color .tag.sel{border-color:#a78bfa;color:#a78bfa;background:#a78bfa0d}.c-color .tag.sel .zh{color:#a78bfa88}
.c-negative .sub-title::before{background:#f87171}.c-negative .tag:hover,.c-negative .tag.sel{border-color:#f87171;color:#f87171;background:#f871710d}.c-negative .tag.sel .zh{color:#f8717188}

/* ─── TEMPLATE CARDS (Pro mode) ─── */
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.tpl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer}
.tpl-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px #0008}
.tpl-img{width:100%;height:180px;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.tpl-img img{width:100%;height:100%;object-fit:cover}
.tpl-img .placeholder{color:var(--text3);font-size:36px}
.tpl-img .upload-btn{position:absolute;bottom:6px;right:6px;background:#000a;border:none;color:var(--text2);padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s}
.tpl-card:hover .upload-btn{opacity:1}
.tpl-body{padding:12px}
.tpl-cat{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:var(--accent)1a;color:var(--accent);font-weight:600;margin-bottom:6px}
.tpl-title{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.4}
.tpl-desc{font-size:11.5px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;font-family:'SF Mono','Consolas',monospace}
.tpl-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border)}
.tpl-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.tpl-heat{display:flex;align-items:center;gap:3px}
.tpl-actions{display:flex;gap:4px}
.tpl-actions .btn{padding:4px 10px;font-size:11px}
.tpl-expand{width:100%;padding:10px;background:var(--surface2);border:none;border-top:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .12s}
.tpl-expand:hover{color:var(--accent);background:var(--accent)0d}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:700px;max-height:85vh;overflow-y:auto;animation:modalIn .2s}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px}.modal-close:hover{color:#ff4d4f}
.modal-body{padding:20px}
.modal-body pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12.5px;line-height:1.7;color:var(--cyan);white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;margin:10px 0;font-family:'SF Mono','Consolas',monospace}
.modal-body .tag{display:inline-block;margin:2px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:9px 18px;border-radius:8px;font-size:12px;color:var(--text);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* HOT TAB styles */
.hot-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-bottom:12px}
.hot-bar .label{font-weight:600;color:var(--fire)}
</style>
</head>

  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="switchMode('dict')">📚 词条库</button>
      <button class="mode-tab" onclick="switchMode('tpl')">🎨 提示词模板</button>
      <button class="mode-tab" onclick="switchMode('hot')">🔥 热度榜</button>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="copyPrompt()">📋 复制</button>
      <button class="btn btn-secondary" onclick="exportData()">💾 导出</button>
      <button class="btn btn-danger" onclick="clearAll()">🗑 清空</button>

  </div>
</div>

<div class="layout">

  <div class="main" id="main">

</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let selected = [];
let mode = 'dict'; // dict | tpl | hot
let dictCat = 'all';
let tplCat = 'all';

// Persistent data via localStorage
function getStore(key, def) { try { return JSON.parse(localStorage.getItem('nb_'+key)) || def; } catch(e) { return def; } }
function setStore(key, val) { try { localStorage.setItem('nb_'+key, JSON.stringify(val)); } catch(e) {} }

let clicks = getStore('clicks', {});     // { "en_string": count }
let images = getStore('images', {});     // { "tpl_id": "base64..." }
let templateClicks = getStore('tplClicks', {}); // { "tpl_id": count }

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
const esc = s => s.replace(/'/g,"\\'").replace(/"/g,'&quot;');
const $ = id => document.getElementById(id);
let toastTimer;
function toast(msg) { $('toast').textContent=msg; $('toast').classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2200); }

function getHeat(count) {
  if(count>=20) return '🔥🔥🔥🔥';
  if(count>=10) return '🔥🔥🔥';
  if(count>=5)  return '🔥🔥';
  if(count>=2)  return '🔥';
  return '';
}

function getHeatClass(count) {
  if(count>=20) return 'heat-fire';
  if(count>=10) return 'heat-hot';
  if(count>=5)  return 'heat-warm';
  if(count>=2)  return 'heat-cold';
  return '';
}

// ═══════════════════════════════════════════════
//  MODE SWITCH
// ═══════════════════════════════════════════════
function switchMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => t.classList.toggle('active', ['dict','tpl','hot'][i]===m));
  buildSidebar();
  renderContent();
}

// ═══════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar() {
  const sb = $('sidebar');
  let h = `<div class="search-box"><div class="search-wrap"><input class="search-input" id="searchInput" placeholder="🔍 搜索词条..." oninput="handleSearch(this.value)"></div></div>`;
  
  if(mode==='dict') {
    h += `<div class="sidebar-section"><div class="sidebar-label">词条分类</div>`;
    h += sbItem('all','⚡','全部',totalDict(),'active');
    for(const[k,v] of Object.entries(DICT)) {
      h += sbItem(k,v.icon,v.label,countCat(k));
    }
    h += `</div>`;
    // hot tags
    h += `<div class="sidebar-section"><div class="sidebar-label">🔥 最近使用</div>`;
    const recent = getRecentTags(8);
    if(recent.length===0) h += `<div style="padding:6px 10px;font-size:11px;color:var(--text3)">暂无使用记录</div>`;
    else recent.forEach(r => { h += `<div class="sidebar-item" onclick="copySingle('${esc(r.en)}')" title="${esc(r.zh)}"><span class="icon">📋</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.zh}</span><span class="heat ${getHeatClass(r.count)}">${r.count}</span></div>`; });
    h += `</div>`;
  } else if(mode==='tpl') {
    const cats = [...new Set(TEMPLATES.map(t=>t.cat))];
    h += `<div class="sidebar-section"><div class="sidebar-label">模板来源</div>`;
    h += sbItem('all','📦','全部模板',TEMPLATES.length,'active');
    cats.forEach(c => { h += sbItem('tpl-'+c,'🏷',c,TEMPLATES.filter(t=>t.cat===c).length); });
    // sub-cats for active
    const activeCat = tplCat==='all' ? null : tplCat.replace('tpl-','');
    if(activeCat) {
      const subs = [...new Set(TEMPLATES.filter(t=>t.cat===activeCat).map(t=>t.sub))];
      h += `<div class="sidebar-label" style="margin-top:8px">子分类</div>`;
      subs.forEach(s => {
        const cnt = TEMPLATES.filter(t=>t.cat===activeCat&&t.sub===s).length;
        h += `<div class="sidebar-item" onclick="tplSubFilter('${esc(s)}','${activeCat}')"><span class="icon">📁</span>${s}<span class="count">${cnt}</span></div>`;
      });
    }
    h += `</div>`;
  } else {
    h += `<div class="sidebar-section"><div class="sidebar-label">热度排行</div>`;
    // dict hot
    h += `<div class="sidebar-label">词条热度 TOP 10</div>`;
    const dictHot = getAllTagStats().sort((a,b)=>b.count-a.count).slice(0,10);
    dictHot.forEach((r,i) => { h += `<div class="sidebar-item" onclick="copySingle('${esc(r.en)}')"><span class="icon">${i+1<=3?'🔥':'📌'}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${r.zh}</span><span class="count">${r.count}</span></div>`; });
    h += `<div class="sidebar-label" style="margin-top:10px">模板热度 TOP 5</div>`;
    const tplHot = TEMPLATES.map(t=>({...t,clicks:templateClicks[t.id]||0})).sort((a,b)=>b.clicks-a.clicks).slice(0,5);
    tplHot.forEach((t,i) => { h += `<div class="sidebar-item" onclick="showTplDetail('${t.id}')"><span class="icon">${i+1<=3?'🔥':'📌'}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${t.title}</span><span class="count">${t.clicks}</span></div>`; });
    h += `</div>`;
  }
  
  // bottom stats
  const totalClicks = Object.values(clicks).reduce((a,b)=>a+b,0) + Object.values(templateClicks).reduce((a,b)=>a+b,0);
  const usedTags = Object.keys(clicks).length;
  const usedTpls = Object.keys(templateClicks).length;
  h += `<div class="sidebar-bottom">
    <div class="stat-row"><span>词条总点击</span><span>${totalClicks}</span></div>
    <div class="stat-row"><span>使用过词条</span><span>${usedTags}</span></div>
    <div class="stat-row"><span>使用过模板</span><span>${usedTpls}</span></div>
    <div class="stat-row"><span>已上传效果图</span><span>${Object.keys(images).length}</span></div>
  </div>`;
  sb.innerHTML = h;
}

function sbItem(key,icon,label,count,cls='') {
  return `<div class="sidebar-item ${cls}" onclick="${mode==='dict'?`showDictCat('${key}',this)`:`tplCatFilter('${key}',this)`}"><span class="icon">${icon}</span>${label}<span class="count">${count}</span></div>`;
}

function totalDict(){ let n=0; for(const v of Object.values(DICT)) for(const s of Object.values(v.subs)) n+=s.length; return n; }
function countCat(k){ let n=0; for(const s of Object.values(DICT[k].subs)) n+=s.length; return n; }

function getAllTagStats() {
  const all = [];
  for(const[,cat] of Object.entries(DICT)) for(const[,subs] of Object.entries(cat.subs)) for(const t of subs) all.push({...t, count: clicks[t.en]||0, cat: cat.label});
  return all.filter(t=>t.count>0);
}
function getRecentTags(n) { return getAllTagStats().sort((a,b)=>b.count-a.count).slice(0,n); }

// ═══════════════════════════════════════════════
//  RENDER CONTENT
// ═══════════════════════════════════════════════
function renderContent() {
  if(mode==='dict') renderDict();
  else if(mode==='tpl') renderTemplates();
  else renderHot();
}

// ── DICT MODE ──
function showDictCat(key, el) {
  if(el) { document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
  dictCat = key;
  renderDict();
}

function renderDict() {
  const area = $('content');
  if(dictCat==='all') {
    let h = `<div class="cat-head"><div class="cat-icon">⚡</div><div><div class="cat-title">全部词条</div><div class="cat-desc">点击词条添加到提示词组合 · 右上角数字为使用次数</div></div></div>`;
    for(const[k,cat] of Object.entries(DICT)) {
      h += `<div class="sub" style="margin-bottom:28px"><div class="sub-title ${cat.c}">${cat.icon} ${cat.label}</div><div class="tags">`;
      for(const[,subs] of Object.entries(cat.subs)) for(const t of subs) h += dictTag(t,k,cat.c);
      h += `</div></div>`;
    }
    area.innerHTML = h;
  } else {
    const cat = DICT[dictCat];
    let h = `<div class="cat-head"><div class="cat-icon">${cat.icon}</div><div><div class="cat-title">${cat.label}</div><div class="cat-desc">${cat.desc}</div></div></div>`;
    for(const[sn,subs] of Object.entries(cat.subs)) {
      h += `<div class="sub"><div class="sub-title ${cat.c}">${sn}</div><div class="tags">`;
      for(const t of subs) h += dictTag(t,dictCat,cat.c);
      h += `</div></div>`;
    }
    area.innerHTML = h;
  }
}

function dictTag(t,catKey,colorCls) {
  const sel = selected.some(s=>s.en===t.en) ? 'sel' : '';
  const cnt = clicks[t.en]||0;
  const heat = getHeat(cnt);
  return `<div class="tag ${sel} ${colorCls}" onclick="toggleDictTag('${esc(t.en)}','${esc(t.zh)}','${catKey}')" data-en="${esc(t.en)}">
    ${t.en}<span class="zh">${t.zh}</span>
    ${cnt>0?`<span class="click-count">${cnt}</span>`:''}${heat?`<span class="hot-dot">${heat}</span>`:''}
  </div>`;
}

function toggleDictTag(en,zh,cat) {
  clicks[en] = (clicks[en]||0) + 1;
  setStore('clicks', clicks);
  const idx = selected.findIndex(s=>s.en===en);
  if(idx>-1) selected.splice(idx,1); else selected.push({en,zh,cat});
  updateBuilder();
  // update tag visual
  document.querySelectorAll(`.tag[data-en="${CSS.escape(en)}"]`).forEach(el=>{
    el.classList.toggle('sel', idx===-1);
    // update count display
    const cnt = clicks[en];
    let cc = el.querySelector('.click-count');
    if(cc) cc.textContent = cnt; else { const sp=document.createElement('span'); sp.className='click-count'; sp.textContent=cnt; el.appendChild(sp); }
    let hd = el.querySelector('.hot-dot');
    const heat = getHeat(cnt);
    if(hd) { if(heat) hd.textContent=heat; else hd.remove(); }
    else if(heat) { const sp=document.createElement('span'); sp.className='hot-dot'; sp.textContent=heat; el.appendChild(sp); }
  });
  buildSidebar();
}

function copySingle(en) {
  navigator.clipboard.writeText(en).then(()=>toast('📋 已复制: '+en));
  clicks[en] = (clicks[en]||0) + 1;
  setStore('clicks', clicks);
}

// ── TEMPLATE MODE ──
function tplCatFilter(key, el) {
  if(el) { document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
  tplCat = key;
  renderTemplates();
}
function tplSubFilter(sub, cat) {
  renderTemplates(cat, sub);
}

function renderTemplates(filterCat, filterSub) {
  const area = $('content');
  let list = TEMPLATES;
  const cat = filterCat || (tplCat==='all' ? null : tplCat.replace('tpl-',''));
  if(cat) list = list.filter(t=>t.cat===cat);
  if(filterSub) list = list.filter(t=>t.sub===filterSub);
  
  let h = `<div class="cat-head"><div class="cat-icon">🎨</div><div><div class="cat-title">提示词模板</div><div class="cat-desc">来自 NanoBanana Pro & Seedance 2.0 的完整提示词 · 点击卡片查看详情</div></div></div>`;
  h += `<div class="template-grid">`;
  list.forEach(t => {
    const cnt = templateClicks[t.id]||0;
    const heat = getHeat(cnt);
    const img = images[t.id];
    const catColor = t.cat==='Seedance' ? '#4ade80' : '#f472b6';
    h += `<div class="tpl-card" onclick="showTplDetail('${t.id}')">
      <div class="tpl-img">${img ? `<img src="${img}" alt="">` : '<div class="placeholder">🖼</div>'}
        <button class="upload-btn" onclick="event.stopPropagation();uploadImg('${t.id}')">📷 上传效果图</button>
      </div>
      <div class="tpl-body">
        <span class="tpl-cat" style="background:${catColor}18;color:${catColor}">${t.cat} · ${t.sub}</span>
        <div class="tpl-title">${t.title}</div>
        <div class="tpl-desc">${t.en.substring(0,120)}${t.en.length>120?'...':''}</div>
        <div class="tpl-footer">
          <div class="tpl-meta">
            ${heat?`<span>${heat}</span>`:''}<span>使用 ${cnt} 次</span>
          </div>
          <div class="tpl-actions">
            <button class="btn btn-primary" onclick="event.stopPropagation();copyTemplate('${t.id}')">📋 复制</button>
          </div>
        </div>
      </div>
    </div>`;
  });
  h += `</div>`;
  area.innerHTML = h;
}

function showTplDetail(id) {
  const t = TEMPLATES.find(x=>x.id===id);
  if(!t) return;
  templateClicks[id] = (templateClicks[id]||0) + 1;
  setStore('tplClicks', templateClicks);
  const cnt = templateClicks[id]||0;
  const heat = getHeat(cnt);
  const img = images[id];
  
  let h = `<div class="modal-head"><h3>${t.title}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>`;
  h += `<div class="modal-body">`;
  if(img) h += `<img src="${img}" style="width:100%;border-radius:8px;margin-bottom:12px" alt="">`;
  h += `<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    <span class="tpl-cat" style="background:#f472b618;color:#f472b6">${t.cat}</span>
    <span class="tpl-cat" style="background:#22d3ee18;color:#22d3ee">${t.sub}</span>
    ${heat?`<span class="heat ${getHeatClass(cnt)}">${heat} ${cnt}次</span>`:''}
  </div>`;
  h += `<p style="font-size:13px;color:var(--text2);margin-bottom:8px">${t.zh}</p>`;
  h += `<div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600">英文提示词</div>`;
  h += `<pre id="tplPre_${id}">${t.en}</pre>`;
  h += `<div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-primary" onclick="copyTemplate('${id}')">📋 复制英文提示词</button>
    <button class="btn btn-secondary" onclick="uploadImg('${id}')">📷 上传效果图</button>
    ${img?`<button class="btn btn-danger" onclick="removeImg('${id}')">🗑 删除效果图</button>`:''}
  </div>`;
  h += `</div>`;
  
  $('modalContent').innerHTML = h;
  $('modal').classList.add('show');
  buildSidebar();
}

function closeModal() { $('modal').classList.remove('show'); }
$('modal').addEventListener('click', e => { if(e.target===$('modal')) closeModal(); });

function copyTemplate(id) {
  const t = TEMPLATES.find(x=>x.id===id);
  if(!t) return;
  navigator.clipboard.writeText(t.en).then(()=>toast('✅ 提示词已复制！'));
}

// ── IMAGE UPLOAD ──
function uploadImg(id) {
  const input = $('imgInput');
  input.onchange = () => {
    const file = input.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024) { toast('⚠ 图片不能超过 2MB'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      // compress
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 600;
        let w = img.width, h = img.height;
        if(w>MAX||h>MAX) { if(w>h){h=h*MAX/w;w=MAX;}else{w=w*MAX/h;h=MAX;} }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const data = canvas.toDataURL('image/jpeg',0.7);
        images[id] = data;
        setStore('images', images);
        toast('✅ 效果图已上传！');
        renderContent();
        buildSidebar();
        // re-open modal if was open
        if($('modal').classList.contains('show')) showTplDetail(id);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    input.value = '';
  };
  input.click();
}

function removeImg(id) {
  delete images[id];
  setStore('images', images);
  toast('🗑 效果图已删除');
  closeModal();
  renderContent();
  buildSidebar();
}

// ── HOT MODE ──
function renderHot() {
  const area = $('content');
  const allTags = getAllTagStats().sort((a,b)=>b.count-a.count);
  
  let h = `<div class="cat-head"><div class="cat-icon">🔥</div><div><div class="cat-title">热度排行榜</div><div class="cat-desc">基于你的使用频率自动统计 · 越用越准</div></div></div>`;
  
  // Dict tags
  h += `<div class="sub"><div class="sub-title">📊 词条热度 TOP 20</div><div class="tags">`;
  allTags.slice(0,20).forEach((t,i) => {
    const rank = i<3 ? ['🥇','🥈','🥉'][i] : `#${i+1}`;
    h += `<div class="tag" onclick="toggleDictTag('${esc(t.en)}','${esc(t.zh)}','any')" data-en="${esc(t.en)}" style="border-color:${i<3?'var(--fire)':'var(--border)'}">
      ${rank} ${t.en}<span class="zh">${t.zh}</span>
      <span class="click-count" style="color:var(--fire)">${t.count}次</span>
    </div>`;
  });
  h += `</div></div>`;
  
  // Templates
  const tplSorted = TEMPLATES.map(t=>({...t,clicks:templateClicks[t.id]||0})).sort((a,b)=>b.clicks-a.clicks);
  h += `<div class="sub"><div class="sub-title">🎨 模板热度 TOP 10</div><div class="template-grid" style="margin-top:10px">`;
  tplSorted.slice(0,10).forEach((t,i) => {
    const img = images[t.id];
    const catColor = t.cat==='Seedance'?'#4ade80':'#f472b6';
    h += `<div class="tpl-card" onclick="showTplDetail('${t.id}')">
      <div class="tpl-img">${img?`<img src="${img}" alt="">`:'<div class="placeholder">🖼</div>'}</div>
      <div class="tpl-body">
        <span class="tpl-cat" style="background:${catColor}18;color:${catColor}">#${i+1} · ${t.cat}</span>
        <div class="tpl-title">${t.title}</div>
        <div class="tpl-footer"><div class="tpl-meta"><span>使用 ${t.clicks} 次</span></div>
        <button class="btn btn-primary" onclick="event.stopPropagation();copyTemplate('${t.id}')" style="padding:4px 10px;font-size:11px">📋</button></div>
      </div>
    </div>`;
  });
  h += `</div></div>`;
  
  // Usage stats
  if(allTags.length===0) {
    h += `<div style="text-align:center;padding:40px;color:var(--text3)"><p style="font-size:40px;margin-bottom:12px">📊</p><p>还没有使用记录</p><p style="font-size:12px;margin-top:6px">开始使用词条库吧，热度会自动统计</p></div>`;
  }
  
  area.innerHTML = h;
}

// ── SEARCH ──
function handleSearch(val) {
  const q = val.trim().toLowerCase();
  if(!q) { renderContent(); return; }
  const area = $('content');
  let results = [];
  if(mode==='dict' || mode==='hot') {
    for(const[ck,cat] of Object.entries(DICT)) for(const[sn,subs] of Object.entries(cat.subs)) for(const t of subs) if(t.en.toLowerCase().includes(q)||t.zh.includes(q)) results.push({...t,catKey:ck,catLabel:cat.label,subName:sn,type:'dict'});
  }
  if(mode==='tpl' || mode==='hot') {
    for(const t of TEMPLATES) if(t.en.toLowerCase().includes(q)||t.zh.includes(q)||t.title.toLowerCase().includes(q)) results.push({...t,type:'tpl'});
  }
  
  if(results.length===0) { area.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">🔍 没有找到 "${val}"</div>`; return; }
  
  let h = `<div class="cat-head"><div class="cat-icon">🔍</div><div><div class="cat-title">搜索结果</div><div class="cat-desc">找到 ${results.length} 个匹配项</div></div></div>`;
  h += `<div class="tags">`;
  results.forEach(r => {
    if(r.type==='dict') {
      const sel = selected.some(s=>s.en===r.en)?'sel':'';
      h += `<div class="tag ${sel}" onclick="toggleDictTag('${esc(r.en)}','${esc(r.zh)}','${r.catKey}')" data-en="${esc(r.en)}">
        ${r.en}<span class="zh">${r.zh}</span><span style="font-size:9px;color:var(--text3);display:block">${r.catLabel} › ${r.subName}</span>
      </div>`;
    } else {
      h += `<div class="tag" onclick="showTplDetail('${r.id}')" style="cursor:pointer">
        📋 ${r.title}<span class="zh">${r.cat} · ${r.sub}</span>
      </div>`;
    }
  });
  h += `</div>`;
  area.innerHTML = h;
}

// ═══════════════════════════════════════════════
//  BUILDER
// ═══════════════════════════════════════════════
function updateBuilder() {
  const out = $('builderOut');
  const chips = $('builderChips');
  const cnt = $('selCnt');
  cnt.textContent = selected.length;
  if(selected.length===0) {
    out.textContent = '点击下方词条，自动组合提示词...';
    chips.innerHTML = '';
    return;
  }
  out.textContent = selected.map(s=>s.en).join(', ');
  chips.innerHTML = selected.map((s,i) => `<div class="chip">${s.zh}<span class="x" onclick="removeSel(${i})">×</span></div>`).join('');
}

function removeSel(i) {
  const en = selected[i].en;
  selected.splice(i,1);
  updateBuilder();
  document.querySelectorAll(`.tag[data-en="${CSS.escape(en)}"]`).forEach(el=>el.classList.remove('sel'));
}

function copyPrompt() {
  if(selected.length===0) { toast('⚠ 请先选择词条'); return; }
  navigator.clipboard.writeText(selected.map(s=>s.en).join(', ')).then(()=>toast('✅ 提示词已复制！'));
}

function clearAll() { selected=[]; updateBuilder(); document.querySelectorAll('.tag.sel').forEach(el=>el.classList.remove('sel')); toast('已清空'); }

function exportData() {
  if(selected.length===0 && Object.keys(clicks).length===0) { toast('⚠ 没有可导出的数据'); return; }
  const parts = [];
  if(selected.length>0) {
    parts.push('【当前提示词组合】\n' + selected.map(s=>s.en).join(', '));
    parts.push('\n【词条对照】\n' + selected.map(s=>`${s.en} (${s.zh})`).join('\n'));
  }
  parts.push(`\n【使用统计】\n总点击次数: ${Object.values(clicks).reduce((a,b)=>a+b,0)}`);
  const blob = new Blob([parts.join('\n')],{type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `nanobanana-export-${Date.now()}.txt`;
  a.click();
  toast('✅ 已导出');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildSidebar();
renderContent();
</script>
